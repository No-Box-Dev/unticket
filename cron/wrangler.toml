name = "unticket-cron"
main = "src/index.js"
compatibility_date = "2024-12-01"

# This Worker only runs on the cron trigger + queue consumer; it needs no public
# HTTP route. Disabling workers.dev removes the public URL entirely so the
# manual /__scheduled and /__archive-events endpoints can't be reached from the
# internet (they're also CRON_TOKEN-gated in code as defence in depth).
workers_dev = false

# Same D1 database as the Pages app — the cron writes the same tables
# (repos, issues, pull_requests, features, members, reconcile_runs).
[[d1_databases]]
binding = "DB"
database_name = "unticket"
database_id = "c94084e6-d0be-423c-8de6-249e7cf8bf25"

# Reconciliation tick. Webhooks are the running source of truth; this
# cron exists to catch the cases webhooks structurally miss: deletes
# (GitHub doesn't fire delete webhooks), missed deliveries during
# deploys, and label changes on issues created before the App was
# installed. 30 min is a reasonable RPO without being chatty.
[triggers]
crons = ["*/30 * * * *"]

# Durable background-work consumer. The Pages app (functions/api/webhook.js)
# produces narrate / PR-match / bootstrap / repo-sync tasks here; this Worker's
# queue() handler runs them with retries + a dead-letter queue. PROVISION BEFORE
# DEPLOY: `wrangler queues create unticket-tasks` and
# `wrangler queues create unticket-tasks-dlq`. The consumer records terminal
# failures on the final (1 + max_retries) delivery, so MAX_DELIVERIES in
# src/index.js must equal max_retries + 1 (currently 5).
[[queues.consumers]]
queue = "unticket-tasks"
max_batch_size = 10
max_retries = 4
dead_letter_queue = "unticket-tasks-dlq"

# Event-table retention: the daily archival sweep writes pruned `events` rows
# here as NDJSON before deleting them from D1 (see src/archive-events.js).
# PROVISION BEFORE DEPLOY: `wrangler r2 bucket create unticket-events-archive`.
[[r2_buckets]]
binding = "EVENTS_ARCHIVE"
bucket_name = "unticket-events-archive"

# Secrets required on this worker before the first run:
#   GITHUB_APP_ID, GITHUB_APP_PRIVATE_KEY  (reconcile + bootstrap/sync tasks)
#   ZHIPU_API_KEY (+ ENCRYPTION_KEY for per-org BYOK)  (narrate + match tasks)
# Set via: wrangler secret put <NAME> --name unticket-cron
# (ZHIPU_API_KEY was already needed for reconcile's PR-merged narration.)
