name = "unticket"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "unticket"
database_id = "c94084e6-d0be-423c-8de6-249e7cf8bf25"

# Durable background-work queue. functions/api/webhook.js produces here instead
# of using context.waitUntil; the cron Worker consumes (see cron/wrangler.toml).
# PROVISION BEFORE DEPLOY: `wrangler queues create unticket-tasks` (+ the DLQ).
# If the binding is absent, enqueueTask records to op_failures instead of 500ing
# the webhook — but the queue must exist for background work to actually run.
[[queues.producers]]
binding = "TASK_QUEUE"
queue = "unticket-tasks"

# Spec attachments — user-uploaded documents (.md, .pdf, .docx, .html)
# attached to a Spec. Objects are keyed `spec/<org_id>/<spec_id>/<attachment_id>`
# for tenant isolation. See functions/api/specs/[id]/attachments/*.
# PROVISION BEFORE DEPLOY: `wrangler r2 bucket create unticket-spec-attachments`.
# Absent binding = attachment endpoints 503 with a clear message.
[[r2_buckets]]
binding = "SPEC_ATTACHMENTS"
bucket_name = "unticket-spec-attachments"
