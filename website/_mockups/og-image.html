<!doctype html><html><head><meta charset="utf-8">
<style>
  @font-face { font-family:'Aeonik'; src:url('../fonts/Aeonik-regular.ttf') format('truetype'); font-weight:400; }
  @font-face { font-family:'Arbeit'; src:url('../fonts/Arbeit-Regular.otf') format('opentype'); font-weight:400; }
  @font-face { font-family:'Arbeit'; src:url('../fonts/Arbeit-Bold.otf') format('opentype'); font-weight:700; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; background:#fafaf9; font-family:'Arbeit',sans-serif; color:#1c1917; overflow:hidden; -webkit-font-smoothing:antialiased; }
  .glow { position:absolute; top:-260px; left:-120px; width:780px; height:780px; border-radius:50%; background:#9B78F4; filter:blur(150px); opacity:.16; }
  .glow2 { position:absolute; bottom:-300px; right:-160px; width:760px; height:760px; border-radius:50%; background:#FE795D; filter:blur(150px); opacity:.14; }
  .wrap { position:relative; z-index:2; padding:64px 72px; height:100%; display:flex; flex-direction:column; justify-content:space-between; }
  .brand { display:flex; align-items:center; gap:12px; font-family:'Aeonik'; font-size:30px; letter-spacing:-.5px; }
  .brand img { width:40px; height:40px; }
  .brand b { font-weight:700; } .brand i { font-weight:400; font-style:normal; color:#6B6462; }
  h1 { font-family:'Aeonik'; font-size:86px; line-height:1.02; font-weight:700; letter-spacing:-.035em; max-width:780px; }
  .grad { background:linear-gradient(120deg,#FE795D,#9B78F4); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent; }
  .sub { margin-top:22px; font-size:25px; color:#6B6462; max-width:640px; line-height:1.35; }
  .foot { display:flex; align-items:center; justify-content:space-between; }
  .url { font-family:'Aeonik'; font-size:24px; font-weight:600; }
  .badge { display:inline-flex; align-items:center; gap:8px; background:#1c1917; color:#fafaf9; padding:11px 20px; border-radius:999px; font-size:18px; font-weight:600; }
  /* mini kanban hint, right side */
  .mini { position:absolute; right:64px; top:150px; display:flex; gap:12px; }
  .mcol { width:118px; }
  .mhead { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#6B6462; margin-bottom:9px; display:flex; align-items:center; gap:6px; }
  .mdot { width:8px; height:8px; border-radius:50%; }
  .mcard { background:#fff; border:1px solid #e7e5e4; border-radius:9px; padding:11px 12px; margin-bottom:9px; box-shadow:0 6px 18px -10px rgba(0,0,0,.18); }
  .mcard .t { font-size:12px; font-weight:600; line-height:1.3; margin-bottom:8px; }
  .mcard .m { display:flex; align-items:center; gap:6px; }
  .mcard .r { font-size:10px; color:#78716c; background:#f5f5f3; border-radius:4px; padding:1px 5px; }
  .mcard .av { width:18px; height:18px; border-radius:50%; margin-left:auto; border:2px solid #fff; }
</style></head><body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="mini">
    <div class="mcol">
      <div class="mhead"><span class="mdot" style="background:#78716c"></span>To do</div>
      <div class="mcard"><div class="t">Refresh-token rotation</div><div class="m"><span class="r">unticket</span><span class="av" style="background:#6d5cc8"></span></div></div>
      <div class="mcard"><div class="t">Slack channel selectors</div><div class="m"><span class="r">unticket</span><span class="av" style="background:#e8814a"></span></div></div>
    </div>
    <div class="mcol">
      <div class="mhead"><span class="mdot" style="background:#6e9970"></span>On prod</div>
      <div class="mcard"><div class="t">PR stale highlighting</div><div class="m"><span class="r">unticket</span><span class="av" style="background:#6a9991"></span></div></div>
      <div class="mcard"><div class="t">Agent rules push</div><div class="m"><span class="r">unticket</span><span class="av" style="background:#b89464"></span></div></div>
    </div>
  </div>
  <div class="wrap">
    <div class="brand"><img src="../logo-mark.svg" alt=""><b>un</b><i>ticket</i></div>
    <div>
      <h1>Project management<br><span class="grad">without the tickets.</span></h1>
      <div class="sub">Open-source project management for GitHub. AGPL-3.0.</div>
    </div>
    <div class="foot">
      <div class="url">unticket.ai</div>
      <div class="badge">★ Star on GitHub</div>
    </div>
  </div>
</body></html>
