<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>N-Vision</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        var s = document.createElement('script');
        s.src = 'https://cdn.noxspot.dev/noxspot.min.js';
        s.async = true;
        s.onload = function () {
          if (window.NoxSpot) {
            window.NoxSpot.init({ siteId: '43139df3-30bb-4208-bee8-1cffb6939b9b' });
          }
        };
        document.head.appendChild(s);
      })();
    </script>
  </body>
</html>
